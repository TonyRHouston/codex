name: Bazel (experimental)
on:
  pull_request: {}
  push:
    branches:
    - main
  workflow_dispatch: null
concurrency:
  group: concurrency-group::${{ github.workflow }}::${{ github.event.pull_request.number
    > 0 && format('pr-{0}', github.event.pull_request.number) || github.ref_name }}${{
    github.ref_name == 'main' && format('::{0}', github.run_id) || ''}}
  cancel-in-progress: ${{ github.ref_name != 'main' }}
jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: macos-15-xlarge
          target: aarch64-apple-darwin
        - os: macos-15-xlarge
          target: x86_64-apple-darwin
        - os: ubuntu-24.04-arm
          target: aarch64-unknown-linux-gnu
        - os: ubuntu-24.04
          target: x86_64-unknown-linux-gnu
        - os: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
        - os: ubuntu-24.04
          target: x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    name: Local Bazel build on ${{ matrix.os }} for ${{ matrix.target }}
    steps:
    - uses: actions/checkout@v6
    - name: Set up Node.js for js_repl tests
      uses: actions/setup-node@v6
      with:
        node-version-file: codex-rs/node-version.txt
    - name: Install DotSlash
      uses: facebook/install-dotslash@v2
    - name: Make DotSlash available in PATH (Unix)
      if: runner.os != 'Windows'
      run: cp "$(which dotslash)" /usr/local/bin
    - name: Make DotSlash available in PATH (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: Copy-Item (Get-Command dotslash).Source -Destination "$env:LOCALAPPDATA\Microsoft\WindowsApps\dotslash.exe"
    - name: Set up Bazel
      uses: bazelbuild/setup-bazelisk@v3
    - name: Check MODULE.bazel.lock is up to date
      if: matrix.os == 'ubuntu-24.04' && matrix.target == 'x86_64-unknown-linux-gnu'
      shell: bash
      run: ./scripts/check-module-bazel-lock.sh
    - name: Configure Bazel startup args (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: '# Use a very short path to reduce argv/path length issues.

        "BAZEL_STARTUP_ARGS=--output_user_root=C:\" | Out-File -FilePath $env:GITHUB_ENV
        -Encoding utf8 -Append

        '
    - name: bazel test //...
      env:
        BUILDBUDDY_API_KEY: ${{ secrets.BUILDBUDDY_API_KEY }}
      shell: bash
      run: "set -o pipefail\n\nbazel_console_log=\"$(mktemp)\"\n\nprint_failed_bazel_test_logs()\
        \ {\n  local console_log=\"$1\"\n  local testlogs_dir\n\n  testlogs_dir=\"\
        $(bazel $BAZEL_STARTUP_ARGS info bazel-testlogs 2>/dev/null || echo bazel-testlogs)\"\
        \n\n  local failed_targets=()\n  while IFS= read -r target; do\n    failed_targets+=(\"\
        $target\")\n  done < <(\n    grep -E '^FAIL: //' \"$console_log\" \\\n   \
        \   | sed -E 's#^FAIL: (//[^ ]+).*#\\1#' \\\n      | sort -u\n  )\n\n  if\
        \ [[ ${#failed_targets[@]} -eq 0 ]]; then\n    echo \"No failed Bazel test\
        \ targets were found in console output.\"\n    return\n  fi\n\n  for target\
        \ in \"${failed_targets[@]}\"; do\n    local rel_path=\"${target#//}\"\n \
        \   rel_path=\"${rel_path/:/\\/}\"\n    local test_log=\"${testlogs_dir}/${rel_path}/test.log\"\
        \n\n    echo \"::group::Bazel test log tail for ${target}\"\n    if [[ -f\
        \ \"$test_log\" ]]; then\n      tail -n 200 \"$test_log\"\n    else\n    \
        \  echo \"Missing test log: $test_log\"\n    fi\n    echo \"::endgroup::\"\
        \n  done\n}\n\nbazel_args=(\n  test\n  //...\n  --test_verbose_timeout_warnings\n\
        \  --build_metadata=REPO_URL=https://github.com/openai/codex.git\n  --build_metadata=COMMIT_SHA=$(git\
        \ rev-parse HEAD)\n  --build_metadata=ROLE=CI\n  --build_metadata=VISIBILITY=PUBLIC\n\
        )\n\nif [[ \"${RUNNER_OS:-}\" != \"Windows\" ]]; then\n  # Bazel test sandboxes\
        \ on macOS may resolve an older Homebrew `node`\n  # before the `actions/setup-node`\
        \ runtime on PATH.\n  node_bin=\"$(which node)\"\n  bazel_args+=(\"--test_env=CODEX_JS_REPL_NODE_PATH=${node_bin}\"\
        )\nfi\n\nif [[ -n \"${BUILDBUDDY_API_KEY:-}\" ]]; then\n  echo \"BuildBuddy\
        \ API key is available; using remote Bazel configuration.\"\n  # Work around\
        \ Bazel 9 remote repo contents cache / overlay materialization failures\n\
        \  # seen in CI (for example \"is not a symlink\" or permission errors while\n\
        \  # materializing external repos such as rules_perl). We still use BuildBuddy\
        \ for\n  # remote execution/cache; this only disables the startup-level repo\
        \ contents cache.\n  set +e\n  bazel $BAZEL_STARTUP_ARGS \\\n    --noexperimental_remote_repo_contents_cache\
        \ \\\n    --bazelrc=.github/workflows/ci.bazelrc \\\n    \"${bazel_args[@]}\"\
        \ \\\n    \"--remote_header=x-buildbuddy-api-key=$BUILDBUDDY_API_KEY\" \\\n\
        \    2>&1 | tee \"$bazel_console_log\"\n  bazel_status=${PIPESTATUS[0]}\n\
        \  set -e\nelse\n  echo \"BuildBuddy API key is not available; using local\
        \ Bazel configuration.\"\n  # Keep fork/community PRs on Bazel but disable\
        \ remote services that are\n  # configured in .bazelrc and require auth.\n\
        \  #\n  # Flag docs:\n  # - Command-line reference: https://bazel.build/reference/command-line-reference\n\
        \  # - Remote caching overview: https://bazel.build/remote/caching\n  # -\
        \ Remote execution overview: https://bazel.build/remote/rbe\n  # - Build Event\
        \ Protocol overview: https://bazel.build/remote/bep\n  #\n  # --noexperimental_remote_repo_contents_cache:\n\
        \  #   disable remote repo contents cache enabled in .bazelrc startup options.\n\
        \  #   https://bazel.build/reference/command-line-reference#startup_options-flag--experimental_remote_repo_contents_cache\n\
        \  # --remote_cache= and --remote_executor=:\n  #   clear remote cache/execution\
        \ endpoints configured in .bazelrc.\n  #   https://bazel.build/reference/command-line-reference#common_options-flag--remote_cache\n\
        \  #   https://bazel.build/reference/command-line-reference#common_options-flag--remote_executor\n\
        \  set +e\n  bazel $BAZEL_STARTUP_ARGS \\\n    --noexperimental_remote_repo_contents_cache\
        \ \\\n    \"${bazel_args[@]}\" \\\n    --remote_cache= \\\n    --remote_executor=\
        \ \\\n    2>&1 | tee \"$bazel_console_log\"\n  bazel_status=${PIPESTATUS[0]}\n\
        \  set -e\nfi\n\nif [[ ${bazel_status:-0} -ne 0 ]]; then\n  print_failed_bazel_test_logs\
        \ \"$bazel_console_log\"\n  exit \"$bazel_status\"\nfi\n"
