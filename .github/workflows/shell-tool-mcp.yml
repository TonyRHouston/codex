name: shell-tool-mcp
on:
  workflow_call:
    inputs:
      release-version:
        description: Version to publish (x.y.z or x.y.z-alpha.N). Defaults to GITHUB_REF_NAME
          when it starts with rust-v.
        required: false
        type: string
      release-tag:
        description: Tag name to use when downloading release artifacts (defaults
          to rust-v<version>).
        required: false
        type: string
      publish:
        description: Whether to publish to npm when the version is releasable.
        required: false
        default: true
        type: boolean
env:
  NODE_VERSION: 22
jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      release_tag: ${{ steps.compute.outputs.release_tag }}
      should_publish: ${{ steps.compute.outputs.should_publish }}
      npm_tag: ${{ steps.compute.outputs.npm_tag }}
    steps:
    - name: Compute version and tags
      id: compute
      run: "set -euo pipefail\n\nversion=\"${{ inputs.release-version }}\"\nrelease_tag=\"\
        ${{ inputs.release-tag }}\"\n\nif [[ -z \"$version\" ]]; then\n  if [[ -n\
        \ \"$release_tag\" && \"$release_tag\" =~ ^rust-v.+ ]]; then\n    version=\"\
        ${release_tag#rust-v}\"\n  elif [[ \"${GITHUB_REF_NAME:-}\" =~ ^rust-v.+ ]];\
        \ then\n    version=\"${GITHUB_REF_NAME#rust-v}\"\n    release_tag=\"${GITHUB_REF_NAME}\"\
        \n  else\n    echo \"release-version is required when GITHUB_REF_NAME is not\
        \ a rust-v tag.\"\n    exit 1\n  fi\nfi\n\nif [[ -z \"$release_tag\" ]]; then\n\
        \  release_tag=\"rust-v${version}\"\nfi\n\nnpm_tag=\"\"\nshould_publish=\"\
        false\"\nif [[ \"$version\" =~ ^[0-9]+\\.[0-9]+\\.[0-9]+$ ]]; then\n  should_publish=\"\
        true\"\nelif [[ \"$version\" =~ ^[0-9]+\\.[0-9]+\\.[0-9]+-alpha\\.[0-9]+$\
        \ ]]; then\n  should_publish=\"true\"\n  npm_tag=\"alpha\"\nfi\n\necho \"\
        version=${version}\" >> \"$GITHUB_OUTPUT\"\necho \"release_tag=${release_tag}\"\
        \ >> \"$GITHUB_OUTPUT\"\necho \"npm_tag=${npm_tag}\" >> \"$GITHUB_OUTPUT\"\
        \necho \"should_publish=${should_publish}\" >> \"$GITHUB_OUTPUT\"\n"
  bash-linux:
    name: Build Bash (Linux) - ${{ matrix.variant }} - ${{ matrix.target }}
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: ubuntu-24.04
          image: ubuntu:24.04
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: ubuntu-22.04
          image: ubuntu:22.04
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: debian-12
          image: debian:12
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: debian-11
          image: debian:11
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: centos-9
          image: quay.io/centos/centos:stream9
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: ubuntu-24.04
          image: arm64v8/ubuntu:24.04
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: ubuntu-22.04
          image: arm64v8/ubuntu:22.04
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: ubuntu-20.04
          image: arm64v8/ubuntu:20.04
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: debian-12
          image: arm64v8/debian:12
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: debian-11
          image: arm64v8/debian:11
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: centos-9
          image: quay.io/centos/centos:stream9
    steps:
    - name: Install build prerequisites
      shell: bash
      run: "set -euo pipefail\nif command -v apt-get >/dev/null 2>&1; then\n  apt-get\
        \ update\n  DEBIAN_FRONTEND=noninteractive apt-get install -y git build-essential\
        \ bison autoconf gettext libncursesw5-dev\nelif command -v dnf >/dev/null\
        \ 2>&1; then\n  dnf install -y git gcc gcc-c++ make bison autoconf gettext\
        \ ncurses-devel\nelif command -v yum >/dev/null 2>&1; then\n  yum install\
        \ -y git gcc gcc-c++ make bison autoconf gettext ncurses-devel\nelse\n  echo\
        \ \"Unsupported package manager in container\"\n  exit 1\nfi\n"
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Build patched Bash
      shell: bash
      run: 'set -euo pipefail

        git clone --depth 1 https://github.com/bolinfest/bash /tmp/bash

        cd /tmp/bash

        git fetch --depth 1 origin a8a1c2fac029404d3f42cd39f5a20f24b6e4fe4b

        git checkout a8a1c2fac029404d3f42cd39f5a20f24b6e4fe4b

        git apply "${GITHUB_WORKSPACE}/shell-tool-mcp/patches/bash-exec-wrapper.patch"

        ./configure --without-bash-malloc

        cores="$(command -v nproc >/dev/null 2>&1 && nproc || getconf _NPROCESSORS_ONLN)"

        make -j"${cores}"


        dest="${GITHUB_WORKSPACE}/artifacts/vendor/${{ matrix.target }}/bash/${{ matrix.variant
        }}"

        mkdir -p "$dest"

        cp bash "$dest/bash"

        '
    - uses: actions/upload-artifact@v6
      with:
        name: shell-tool-mcp-bash-${{ matrix.target }}-${{ matrix.variant }}
        path: artifacts/**
        if-no-files-found: error
  bash-darwin:
    name: Build Bash (macOS) - ${{ matrix.variant }} - ${{ matrix.target }}
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: macos-15-xlarge
          target: aarch64-apple-darwin
          variant: macos-15
        - runner: macos-14
          target: aarch64-apple-darwin
          variant: macos-14
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Build patched Bash
      shell: bash
      run: 'set -euo pipefail

        git clone --depth 1 https://github.com/bolinfest/bash /tmp/bash

        cd /tmp/bash

        git fetch --depth 1 origin a8a1c2fac029404d3f42cd39f5a20f24b6e4fe4b

        git checkout a8a1c2fac029404d3f42cd39f5a20f24b6e4fe4b

        git apply "${GITHUB_WORKSPACE}/shell-tool-mcp/patches/bash-exec-wrapper.patch"

        ./configure --without-bash-malloc

        cores="$(getconf _NPROCESSORS_ONLN)"

        make -j"${cores}"


        dest="${GITHUB_WORKSPACE}/artifacts/vendor/${{ matrix.target }}/bash/${{ matrix.variant
        }}"

        mkdir -p "$dest"

        cp bash "$dest/bash"

        '
    - uses: actions/upload-artifact@v6
      with:
        name: shell-tool-mcp-bash-${{ matrix.target }}-${{ matrix.variant }}
        path: artifacts/**
        if-no-files-found: error
  zsh-linux:
    name: Build zsh (Linux) - ${{ matrix.variant }} - ${{ matrix.target }}
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: ubuntu-24.04
          image: ubuntu:24.04
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: ubuntu-22.04
          image: ubuntu:22.04
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: debian-12
          image: debian:12
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: debian-11
          image: debian:11
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
          variant: centos-9
          image: quay.io/centos/centos:stream9
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: ubuntu-24.04
          image: arm64v8/ubuntu:24.04
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: ubuntu-22.04
          image: arm64v8/ubuntu:22.04
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: ubuntu-20.04
          image: arm64v8/ubuntu:20.04
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: debian-12
          image: arm64v8/debian:12
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: debian-11
          image: arm64v8/debian:11
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
          variant: centos-9
          image: quay.io/centos/centos:stream9
    steps:
    - name: Install build prerequisites
      shell: bash
      run: "set -euo pipefail\nif command -v apt-get >/dev/null 2>&1; then\n  apt-get\
        \ update\n  DEBIAN_FRONTEND=noninteractive apt-get install -y git build-essential\
        \ bison autoconf gettext libncursesw5-dev\nelif command -v dnf >/dev/null\
        \ 2>&1; then\n  dnf install -y git gcc gcc-c++ make bison autoconf gettext\
        \ ncurses-devel\nelif command -v yum >/dev/null 2>&1; then\n  yum install\
        \ -y git gcc gcc-c++ make bison autoconf gettext ncurses-devel\nelse\n  echo\
        \ \"Unsupported package manager in container\"\n  exit 1\nfi\n"
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Build patched zsh
      shell: bash
      run: 'set -euo pipefail

        git clone https://git.code.sf.net/p/zsh/code /tmp/zsh

        cd /tmp/zsh

        git checkout 77045ef899e53b9598bebc5a41db93a548a40ca6

        git apply "${GITHUB_WORKSPACE}/shell-tool-mcp/patches/zsh-exec-wrapper.patch"

        ./Util/preconfig

        ./configure

        cores="$(command -v nproc >/dev/null 2>&1 && nproc || getconf _NPROCESSORS_ONLN)"

        make -j"${cores}"


        dest="${GITHUB_WORKSPACE}/artifacts/vendor/${{ matrix.target }}/zsh/${{ matrix.variant
        }}"

        mkdir -p "$dest"

        cp Src/zsh "$dest/zsh"

        '
    - name: Smoke test zsh exec wrapper
      shell: bash
      run: "set -euo pipefail\ntmpdir=\"$(mktemp -d)\"\ncat > \"$tmpdir/exec-wrapper\"\
        \ <<'EOF'\n#!/usr/bin/env bash\nset -euo pipefail\n: \"${CODEX_WRAPPER_LOG:?missing\
        \ CODEX_WRAPPER_LOG}\"\nprintf '%s\\n' \"$@\" > \"$CODEX_WRAPPER_LOG\"\nfile=\"\
        $1\"\nshift\nif [[ \"$#\" -eq 0 ]]; then\n  exec \"$file\"\nfi\narg0=\"$1\"\
        \nshift\nexec -a \"$arg0\" \"$file\" \"$@\"\nEOF\nchmod +x \"$tmpdir/exec-wrapper\"\
        \n\nCODEX_WRAPPER_LOG=\"$tmpdir/wrapper.log\" \\\nEXEC_WRAPPER=\"$tmpdir/exec-wrapper\"\
        \ \\\n/tmp/zsh/Src/zsh -fc '/bin/echo smoke-zsh' > \"$tmpdir/stdout.txt\"\n\
        \ngrep -Fx \"smoke-zsh\" \"$tmpdir/stdout.txt\"\ngrep -Fx \"/bin/echo\" \"\
        $tmpdir/wrapper.log\"\n"
    - uses: actions/upload-artifact@v6
      with:
        name: shell-tool-mcp-zsh-${{ matrix.target }}-${{ matrix.variant }}
        path: artifacts/**
        if-no-files-found: error
  zsh-darwin:
    name: Build zsh (macOS) - ${{ matrix.variant }} - ${{ matrix.target }}
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: macos-15-xlarge
          target: aarch64-apple-darwin
          variant: macos-15
        - runner: macos-14
          target: aarch64-apple-darwin
          variant: macos-14
    steps:
    - name: Install build prerequisites
      shell: bash
      run: "set -euo pipefail\nif ! command -v autoconf >/dev/null 2>&1; then\n  brew\
        \ install autoconf\nfi\n"
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Build patched zsh
      shell: bash
      run: 'set -euo pipefail

        git clone https://git.code.sf.net/p/zsh/code /tmp/zsh

        cd /tmp/zsh

        git checkout 77045ef899e53b9598bebc5a41db93a548a40ca6

        git apply "${GITHUB_WORKSPACE}/shell-tool-mcp/patches/zsh-exec-wrapper.patch"

        ./Util/preconfig

        ./configure

        cores="$(getconf _NPROCESSORS_ONLN)"

        make -j"${cores}"


        dest="${GITHUB_WORKSPACE}/artifacts/vendor/${{ matrix.target }}/zsh/${{ matrix.variant
        }}"

        mkdir -p "$dest"

        cp Src/zsh "$dest/zsh"

        '
    - name: Smoke test zsh exec wrapper
      shell: bash
      run: "set -euo pipefail\ntmpdir=\"$(mktemp -d)\"\ncat > \"$tmpdir/exec-wrapper\"\
        \ <<'EOF'\n#!/usr/bin/env bash\nset -euo pipefail\n: \"${CODEX_WRAPPER_LOG:?missing\
        \ CODEX_WRAPPER_LOG}\"\nprintf '%s\\n' \"$@\" > \"$CODEX_WRAPPER_LOG\"\nfile=\"\
        $1\"\nshift\nif [[ \"$#\" -eq 0 ]]; then\n  exec \"$file\"\nfi\narg0=\"$1\"\
        \nshift\nexec -a \"$arg0\" \"$file\" \"$@\"\nEOF\nchmod +x \"$tmpdir/exec-wrapper\"\
        \n\nCODEX_WRAPPER_LOG=\"$tmpdir/wrapper.log\" \\\nEXEC_WRAPPER=\"$tmpdir/exec-wrapper\"\
        \ \\\n/tmp/zsh/Src/zsh -fc '/bin/echo smoke-zsh' > \"$tmpdir/stdout.txt\"\n\
        \ngrep -Fx \"smoke-zsh\" \"$tmpdir/stdout.txt\"\ngrep -Fx \"/bin/echo\" \"\
        $tmpdir/wrapper.log\"\n"
    - uses: actions/upload-artifact@v6
      with:
        name: shell-tool-mcp-zsh-${{ matrix.target }}-${{ matrix.variant }}
        path: artifacts/**
        if-no-files-found: error
  package:
    name: Package npm module
    needs:
    - metadata
    - bash-linux
    - bash-darwin
    - zsh-linux
    - zsh-darwin
    runs-on: ubuntu-latest
    env:
      PACKAGE_VERSION: ${{ needs.metadata.outputs.version }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
    - name: Install JavaScript dependencies
      run: pnpm install --frozen-lockfile
    - name: Build (shell-tool-mcp)
      run: pnpm --filter @openai/codex-shell-tool-mcp run build
    - name: Download build artifacts
      uses: actions/download-artifact@v7
      with:
        path: artifacts
    - name: Assemble staging directory
      id: staging
      shell: bash
      run: "set -euo pipefail\nstaging=\"${STAGING_DIR}\"\nmkdir -p \"$staging\" \"\
        $staging/vendor\"\ncp shell-tool-mcp/README.md \"$staging/\"\ncp shell-tool-mcp/package.json\
        \ \"$staging/\"\n\nfound_vendor=\"false\"\nshopt -s nullglob\nfor vendor_dir\
        \ in artifacts/*/vendor; do\n  rsync -av \"$vendor_dir/\" \"$staging/vendor/\"\
        \n  found_vendor=\"true\"\ndone\nif [[ \"$found_vendor\" == \"false\" ]];\
        \ then\n  echo \"No vendor payloads were downloaded.\"\n  exit 1\nfi\n\nnode\
        \ - <<'NODE'\n  import fs from \"node:fs\";\n  import path from \"node:path\"\
        ;\n\n  const stagingDir = process.env.STAGING_DIR;\n  const version = process.env.PACKAGE_VERSION;\n\
        \  const pkgPath = path.join(stagingDir, \"package.json\");\n  const pkg =\
        \ JSON.parse(fs.readFileSync(pkgPath, \"utf8\"));\n  pkg.version = version;\n\
        \  fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + \"\\n\");\nNODE\n\
        \necho \"dir=$staging\" >> \"$GITHUB_OUTPUT\"\n"
      env:
        STAGING_DIR: ${{ runner.temp }}/shell-tool-mcp
    - name: Ensure binaries are executable
      run: "set -euo pipefail\nstaging=\"${{ steps.staging.outputs.dir }}\"\nchmod\
        \ +x \\\n  \"$staging\"/vendor/*/bash/*/bash \\\n  \"$staging\"/vendor/*/zsh/*/zsh\n"
    - name: Create npm tarball
      shell: bash
      run: 'set -euo pipefail

        mkdir -p dist/npm

        staging="${{ steps.staging.outputs.dir }}"

        pack_info=$(cd "$staging" && npm pack --ignore-scripts --json --pack-destination
        "${GITHUB_WORKSPACE}/dist/npm")

        filename=$(PACK_INFO="$pack_info" node -e ''const data = JSON.parse(process.env.PACK_INFO);
        console.log(data[0].filename);'')

        mv "dist/npm/${filename}" "dist/npm/codex-shell-tool-mcp-npm-${PACKAGE_VERSION}.tgz"

        '
    - uses: actions/upload-artifact@v6
      with:
        name: codex-shell-tool-mcp-npm
        path: dist/npm/codex-shell-tool-mcp-npm-${{ env.PACKAGE_VERSION }}.tgz
        if-no-files-found: error
  publish:
    name: Publish npm package
    needs:
    - metadata
    - package
    if: ${{ inputs.publish && needs.metadata.outputs.should_publish == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: ${{ env.NODE_VERSION }}
        registry-url: https://registry.npmjs.org
        scope: '@openai'
    - name: Update npm
      run: npm install -g npm@latest
    - name: Download npm tarball
      uses: actions/download-artifact@v7
      with:
        name: codex-shell-tool-mcp-npm
        path: dist/npm
    - name: Publish to npm
      env:
        NPM_TAG: ${{ needs.metadata.outputs.npm_tag }}
        VERSION: ${{ needs.metadata.outputs.version }}
      shell: bash
      run: "set -euo pipefail\ntag_args=()\nif [[ -n \"${NPM_TAG}\" ]]; then\n  tag_args+=(--tag\
        \ \"${NPM_TAG}\")\nfi\nnpm publish \"dist/npm/codex-shell-tool-mcp-npm-${VERSION}.tgz\"\
        \ \"${tag_args[@]}\"\n"
