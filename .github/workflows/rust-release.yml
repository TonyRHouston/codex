name: rust-release
on:
  push:
    tags:
    - rust-v*.*.*
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  tag-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: dtolnay/rust-toolchain@1.92
    - name: Validate tag matches Cargo.toml version
      shell: bash
      run: "set -euo pipefail\necho \"::group::Tag validation\"\n\n# 1. Must be a\
        \ tag and match the regex\n[[ \"${GITHUB_REF_TYPE}\" == \"tag\" ]] \\\n  ||\
        \ { echo \"\u274C  Not a tag push\"; exit 1; }\n[[ \"${GITHUB_REF_NAME}\"\
        \ =~ ^rust-v[0-9]+\\.[0-9]+\\.[0-9]+(-(alpha|beta)(\\.[0-9]+)?)?$ ]] \\\n\
        \  || { echo \"\u274C  Tag '${GITHUB_REF_NAME}' doesn't match expected format\"\
        ; exit 1; }\n\n# 2. Extract versions\ntag_ver=\"${GITHUB_REF_NAME#rust-v}\"\
        \ncargo_ver=\"$(grep -m1 '^version' codex-rs/Cargo.toml \\\n             \
        \ | sed -E 's/version *= *\"([^\"]+)\".*/\\1/')\"\n\n# 3. Compare\n[[ \"${tag_ver}\"\
        \ == \"${cargo_ver}\" ]] \\\n  || { echo \"\u274C  Tag ${tag_ver} \u2260 Cargo.toml\
        \ ${cargo_ver}\"; exit 1; }\n\necho \"\u2705  Tag and Cargo.toml agree (${tag_ver})\"\
        \necho \"::endgroup::\"\n"
  build:
    needs: tag-check
    name: Build - ${{ matrix.runner }} - ${{ matrix.target }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: ${{ contains(github.ref_name, '-alpha') && 'thin'
        || 'fat' }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: macos-15-xlarge
          target: aarch64-apple-darwin
        - runner: macos-15-xlarge
          target: x86_64-apple-darwin
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-musl
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-gnu
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-musl
        - runner: ubuntu-24.04-arm
          target: aarch64-unknown-linux-gnu
    steps:
    - uses: actions/checkout@v6
    - name: Print runner specs (Linux)
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: 'set -euo pipefail

        cpu_model="$(lscpu | awk -F: ''/Model name/ {gsub(/^[ \t]+/, "", $2); print
        $2; exit}'')"

        total_ram="$(awk ''/MemTotal/ {printf "%.1f GiB\n", $2 / 1024 / 1024}'' /proc/meminfo)"

        echo "Runner: ${RUNNER_NAME:-unknown}"

        echo "OS: $(uname -a)"

        echo "CPU model: ${cpu_model}"

        echo "Logical CPUs: $(nproc)"

        echo "Total RAM: ${total_ram}"

        echo "Disk usage:"

        df -h .

        '
    - name: Print runner specs (macOS)
      if: ${{ runner.os == 'macOS' }}
      shell: bash
      run: 'set -euo pipefail

        total_ram="$(sysctl -n hw.memsize | awk ''{printf "%.1f GiB\n", $1 / 1024
        / 1024 / 1024}'')"

        echo "Runner: ${RUNNER_NAME:-unknown}"

        echo "OS: $(sw_vers -productName) $(sw_vers -productVersion)"

        echo "Hardware model: $(sysctl -n hw.model)"

        echo "CPU architecture: $(uname -m)"

        echo "Logical CPUs: $(sysctl -n hw.logicalcpu)"

        echo "Physical CPUs: $(sysctl -n hw.physicalcpu)"

        echo "Total RAM: ${total_ram}"

        echo "Disk usage:"

        df -h .

        '
    - name: Install Linux bwrap build dependencies
      if: ${{ runner.os == 'Linux' }}
      shell: bash
      run: 'set -euo pipefail

        sudo apt-get update -y

        sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends
        pkg-config libcap-dev

        '
    - name: Install UBSan runtime (musl)
      if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'
        }}
      shell: bash
      run: "set -euo pipefail\nif command -v apt-get >/dev/null 2>&1; then\n  sudo\
        \ apt-get update -y\n  sudo DEBIAN_FRONTEND=noninteractive apt-get install\
        \ -y libubsan1\nfi\n"
    - uses: dtolnay/rust-toolchain@1.93.0
      with:
        targets: ${{ matrix.target }}
    - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
      name: Use hermetic Cargo home (musl)
      shell: bash
      run: 'set -euo pipefail

        cargo_home="${GITHUB_WORKSPACE}/.cargo-home"

        mkdir -p "${cargo_home}/bin"

        echo "CARGO_HOME=${cargo_home}" >> "$GITHUB_ENV"

        echo "${cargo_home}/bin" >> "$GITHUB_PATH"

        : > "${cargo_home}/config.toml"

        '
    - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
      name: Install Zig
      uses: mlugg/setup-zig@v2
      with:
        version: 0.14.0
    - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
      name: Install musl build tools
      env:
        TARGET: ${{ matrix.target }}
      run: bash "${GITHUB_WORKSPACE}/.github/scripts/install-musl-build-tools.sh"
    - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
      name: Configure rustc UBSan wrapper (musl host)
      shell: bash
      run: "set -euo pipefail\nubsan=\"\"\nif command -v ldconfig >/dev/null 2>&1;\
        \ then\n  ubsan=\"$(ldconfig -p | grep -m1 'libubsan\\.so\\.1' | sed -E 's/.*=>\
        \ (.*)$/\\1/')\"\nfi\nwrapper_root=\"${RUNNER_TEMP:-/tmp}\"\nwrapper=\"${wrapper_root}/rustc-ubsan-wrapper\"\
        \ncat > \"${wrapper}\" <<EOF\n#!/usr/bin/env bash\nset -euo pipefail\nif [[\
        \ -n \"${ubsan}\" ]]; then\n  export LD_PRELOAD=\"${ubsan}\\${LD_PRELOAD:+:\\\
        ${LD_PRELOAD}}\"\nfi\nexec \"\\$1\" \"\\${@:2}\"\nEOF\nchmod +x \"${wrapper}\"\
        \necho \"RUSTC_WRAPPER=${wrapper}\" >> \"$GITHUB_ENV\"\necho \"RUSTC_WORKSPACE_WRAPPER=\"\
        \ >> \"$GITHUB_ENV\"\n"
    - if: ${{ matrix.target == 'x86_64-unknown-linux-musl' || matrix.target == 'aarch64-unknown-linux-musl'}}
      name: Clear sanitizer flags (musl)
      shell: bash
      run: "set -euo pipefail\n# Avoid problematic aws-lc jitter entropy code path\
        \ on musl builders.\necho \"AWS_LC_SYS_NO_JITTER_ENTROPY=1\" >> \"$GITHUB_ENV\"\
        \ntarget_no_jitter=\"AWS_LC_SYS_NO_JITTER_ENTROPY_${{ matrix.target }}\"\n\
        target_no_jitter=\"${target_no_jitter//-/_}\"\necho \"${target_no_jitter}=1\"\
        \ >> \"$GITHUB_ENV\"\n\n# Clear global Rust flags so host/proc-macro builds\
        \ don't pull in UBSan.\necho \"RUSTFLAGS=\" >> \"$GITHUB_ENV\"\necho \"CARGO_ENCODED_RUSTFLAGS=\"\
        \ >> \"$GITHUB_ENV\"\necho \"RUSTDOCFLAGS=\" >> \"$GITHUB_ENV\"\n# Override\
        \ any runner-level Cargo config rustflags as well.\necho \"CARGO_BUILD_RUSTFLAGS=\"\
        \ >> \"$GITHUB_ENV\"\necho \"CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_RUSTFLAGS=\"\
        \ >> \"$GITHUB_ENV\"\necho \"CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_RUSTFLAGS=\"\
        \ >> \"$GITHUB_ENV\"\necho \"CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=\"\
        \ >> \"$GITHUB_ENV\"\necho \"CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_RUSTFLAGS=\"\
        \ >> \"$GITHUB_ENV\"\n\nsanitize_flags() {\n  local input=\"$1\"\n  input=\"\
        ${input//-fsanitize=undefined/}\"\n  input=\"${input//-fno-sanitize-recover=undefined/}\"\
        \n  input=\"${input//-fno-sanitize-trap=undefined/}\"\n  echo \"$input\"\n\
        }\n\ncflags=\"$(sanitize_flags \"${CFLAGS-}\")\"\ncxxflags=\"$(sanitize_flags\
        \ \"${CXXFLAGS-}\")\"\necho \"CFLAGS=${cflags}\" >> \"$GITHUB_ENV\"\necho\
        \ \"CXXFLAGS=${cxxflags}\" >> \"$GITHUB_ENV\"\n"
    - name: Cargo build
      shell: bash
      run: 'cargo build --target ${{ matrix.target }} --release --timings --bin codex
        --bin codex-responses-api-proxy

        '
    - name: Upload Cargo timings
      uses: actions/upload-artifact@v6
      with:
        name: cargo-timings-rust-release-${{ matrix.target }}
        path: codex-rs/target/**/cargo-timings/cargo-timing.html
        if-no-files-found: warn
    - if: ${{ contains(matrix.target, 'linux') }}
      name: Cosign Linux artifacts
      uses: ./.github/actions/linux-code-sign
      with:
        target: ${{ matrix.target }}
        artifacts-dir: ${{ github.workspace }}/codex-rs/target/${{ matrix.target }}/release
    - if: ${{ runner.os == 'macOS' }}
      name: MacOS code signing (binaries)
      uses: ./.github/actions/macos-code-sign
      with:
        target: ${{ matrix.target }}
        sign-binaries: true
        sign-dmg: false
        apple-certificate: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        apple-notarization-key-p8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
        apple-notarization-key-id: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
        apple-notarization-issuer-id: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
    - if: ${{ runner.os == 'macOS' }}
      name: Build macOS dmg
      shell: bash
      run: "set -euo pipefail\n\ntarget=\"${{ matrix.target }}\"\nrelease_dir=\"target/${target}/release\"\
        \ndmg_root=\"${RUNNER_TEMP}/codex-dmg-root\"\nvolname=\"Codex (${target})\"\
        \ndmg_path=\"${release_dir}/codex-${target}.dmg\"\n\n# The previous \"MacOS\
        \ code signing (binaries)\" step signs + notarizes the\n# built artifacts\
        \ in `${release_dir}`. This step packages *those same*\n# signed binaries\
        \ into a dmg.\ncodex_binary_path=\"${release_dir}/codex\"\nproxy_binary_path=\"\
        ${release_dir}/codex-responses-api-proxy\"\n\nrm -rf \"$dmg_root\"\nmkdir\
        \ -p \"$dmg_root\"\n\nif [[ ! -f \"$codex_binary_path\" ]]; then\n  echo \"\
        Binary $codex_binary_path not found\"\n  exit 1\nfi\nif [[ ! -f \"$proxy_binary_path\"\
        \ ]]; then\n  echo \"Binary $proxy_binary_path not found\"\n  exit 1\nfi\n\
        \nditto \"$codex_binary_path\" \"${dmg_root}/codex\"\nditto \"$proxy_binary_path\"\
        \ \"${dmg_root}/codex-responses-api-proxy\"\n\nrm -f \"$dmg_path\"\nhdiutil\
        \ create \\\n  -volname \"$volname\" \\\n  -srcfolder \"$dmg_root\" \\\n \
        \ -format UDZO \\\n  -ov \\\n  \"$dmg_path\"\n\nif [[ ! -f \"$dmg_path\" ]];\
        \ then\n  echo \"dmg $dmg_path not found after build\"\n  exit 1\nfi\n"
    - if: ${{ runner.os == 'macOS' }}
      name: MacOS code signing (dmg)
      uses: ./.github/actions/macos-code-sign
      with:
        target: ${{ matrix.target }}
        sign-binaries: false
        sign-dmg: true
        apple-certificate: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        apple-certificate-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        apple-notarization-key-p8: ${{ secrets.APPLE_NOTARIZATION_KEY_P8 }}
        apple-notarization-key-id: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
        apple-notarization-issuer-id: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
    - name: Stage artifacts
      shell: bash
      run: "dest=\"dist/${{ matrix.target }}\"\nmkdir -p \"$dest\"\n\ncp target/${{\
        \ matrix.target }}/release/codex \"$dest/codex-${{ matrix.target }}\"\ncp\
        \ target/${{ matrix.target }}/release/codex-responses-api-proxy \"$dest/codex-responses-api-proxy-${{\
        \ matrix.target }}\"\n\nif [[ \"${{ matrix.target }}\" == *linux* ]]; then\n\
        \  cp target/${{ matrix.target }}/release/codex.sigstore \"$dest/codex-${{\
        \ matrix.target }}.sigstore\"\n  cp target/${{ matrix.target }}/release/codex-responses-api-proxy.sigstore\
        \ \"$dest/codex-responses-api-proxy-${{ matrix.target }}.sigstore\"\nfi\n\n\
        if [[ \"${{ matrix.target }}\" == *apple-darwin ]]; then\n  cp target/${{\
        \ matrix.target }}/release/codex-${{ matrix.target }}.dmg \"$dest/codex-${{\
        \ matrix.target }}.dmg\"\nfi\n"
    - name: Compress artifacts
      shell: bash
      run: "# Path that contains the uncompressed binaries for the current\n# ${{\
        \ matrix.target }}\ndest=\"dist/${{ matrix.target }}\"\n\n# For compatibility\
        \ with environments that lack the `zstd` tool we\n# additionally create a\
        \ `.tar.gz` alongside every binary we publish.\n# The end result is:\n#  \
        \ codex-<target>.zst          (existing)\n#   codex-<target>.tar.gz      \
        \ (new)\n\n# 1. Produce a .tar.gz for every file in the directory *before*\
        \ we\n#    run `zstd --rm`, because that flag deletes the original files.\n\
        for f in \"$dest\"/*; do\n  base=\"$(basename \"$f\")\"\n  # Skip files that\
        \ are already archives (shouldn't happen, but be\n  # safe).\n  if [[ \"$base\"\
        \ == *.tar.gz || \"$base\" == *.zip || \"$base\" == *.dmg ]]; then\n    continue\n\
        \  fi\n\n  # Don't try to compress signature bundles.\n  if [[ \"$base\" ==\
        \ *.sigstore ]]; then\n    continue\n  fi\n\n  # Create per-binary tar.gz\n\
        \  tar -C \"$dest\" -czf \"$dest/${base}.tar.gz\" \"$base\"\n\n  # Also create\
        \ .zst and remove the uncompressed binaries to keep\n  # non-Windows artifact\
        \ directories small.\n  zstd -T0 -19 --rm \"$dest/$base\"\ndone\n"
    - uses: actions/upload-artifact@v6
      with:
        name: ${{ matrix.target }}
        path: 'codex-rs/dist/${{ matrix.target }}/*

          '
  build-windows:
    needs: tag-check
    uses: ./.github/workflows/rust-release-windows.yml
    with:
      release-lto: ${{ contains(github.ref_name, '-alpha') && 'thin' || 'fat' }}
    secrets: inherit
  shell-tool-mcp:
    name: shell-tool-mcp
    needs: tag-check
    uses: ./.github/workflows/shell-tool-mcp.yml
    with:
      release-tag: ${{ github.ref_name }}
      publish: true
    secrets: inherit
  release:
    needs:
    - build
    - build-windows
    - shell-tool-mcp
    name: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    outputs:
      version: ${{ steps.release_name.outputs.name }}
      tag: ${{ github.ref_name }}
      should_publish_npm: ${{ steps.npm_publish_settings.outputs.should_publish }}
      npm_tag: ${{ steps.npm_publish_settings.outputs.npm_tag }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
    - name: Generate release notes from tag commit message
      id: release_notes
      shell: bash
      run: 'set -euo pipefail


        # On tag pushes, GITHUB_SHA may be a tag object for annotated tags;

        # peel it to the underlying commit.

        commit="$(git rev-parse "${GITHUB_SHA}^{commit}")"

        notes_path="${RUNNER_TEMP}/release-notes.md"


        # Use the commit message for the commit the tag points at (not the

        # annotated tag message).

        git log -1 --format=%B "${commit}" > "${notes_path}"

        # Ensure trailing newline so GitHub''s markdown renderer doesn''t

        # occasionally run the last line into subsequent content.

        echo >> "${notes_path}"


        echo "path=${notes_path}" >> "${GITHUB_OUTPUT}"

        '
    - uses: actions/download-artifact@v7
      with:
        path: dist
    - name: List
      run: ls -R dist/
    - name: Delete entries from dist/ that should not go in the release
      run: 'rm -rf dist/shell-tool-mcp*

        rm -rf dist/windows-binaries*

        # cargo-timing.html appears under multiple target-specific directories.

        # If included in files: dist/**, release upload races on duplicate

        # asset names and can fail with 404s.

        find dist -type f -name ''cargo-timing.html'' -delete

        find dist -type d -empty -delete


        ls -R dist/

        '
    - name: Add config schema release asset
      run: 'cp codex-rs/core/config.schema.json dist/config-schema.json

        '
    - name: Define release name
      id: release_name
      run: '# Extract the version from the tag name, which is in the format

        # "rust-v0.1.0".

        version="${GITHUB_REF_NAME#rust-v}"

        echo "name=${version}" >> $GITHUB_OUTPUT

        '
    - name: Determine npm publish settings
      id: npm_publish_settings
      env:
        VERSION: ${{ steps.release_name.outputs.name }}
      run: "set -euo pipefail\nversion=\"${VERSION}\"\n\nif [[ \"${version}\" =~ ^[0-9]+\\\
        .[0-9]+\\.[0-9]+$ ]]; then\n  echo \"should_publish=true\" >> \"$GITHUB_OUTPUT\"\
        \n  echo \"npm_tag=\" >> \"$GITHUB_OUTPUT\"\nelif [[ \"${version}\" =~ ^[0-9]+\\\
        .[0-9]+\\.[0-9]+-alpha\\.[0-9]+$ ]]; then\n  echo \"should_publish=true\"\
        \ >> \"$GITHUB_OUTPUT\"\n  echo \"npm_tag=alpha\" >> \"$GITHUB_OUTPUT\"\n\
        else\n  echo \"should_publish=false\" >> \"$GITHUB_OUTPUT\"\n  echo \"npm_tag=\"\
        \ >> \"$GITHUB_OUTPUT\"\nfi\n"
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        run_install: false
    - name: Setup Node.js for npm packaging
      uses: actions/setup-node@v6
      with:
        node-version: 22
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - uses: facebook/install-dotslash@v2
    - name: Stage npm packages
      env:
        GH_TOKEN: ${{ github.token }}
      run: "./scripts/stage_npm_packages.py \\\n  --release-version \"${{ steps.release_name.outputs.name\
        \ }}\" \\\n  --package codex \\\n  --package codex-responses-api-proxy \\\n\
        \  --package codex-sdk\n"
    - name: Stage macOS and Linux installer script
      run: 'cp scripts/install/install.sh dist/install.sh

        '
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: ${{ steps.release_name.outputs.name }}
        tag_name: ${{ github.ref_name }}
        body_path: ${{ steps.release_notes.outputs.path }}
        files: dist/**
        prerelease: ${{ contains(steps.release_name.outputs.name, '-') }}
    - uses: facebook/dotslash-publish-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag: ${{ github.ref_name }}
        config: .github/dotslash-config.json
    - name: Trigger developers.openai.com deploy
      if: ${{ !contains(steps.release_name.outputs.name, '-') }}
      continue-on-error: true
      env:
        DEV_WEBSITE_VERCEL_DEPLOY_HOOK_URL: ${{ secrets.DEV_WEBSITE_VERCEL_DEPLOY_HOOK_URL
          }}
      run: "if ! curl -sS -f -o /dev/null -X POST \"$DEV_WEBSITE_VERCEL_DEPLOY_HOOK_URL\"\
        ; then\n  echo \"::warning title=developers.openai.com deploy hook failed::Vercel\
        \ deploy hook POST failed for ${GITHUB_REF_NAME}\"\n  exit 1\nfi\n"
  publish-npm:
    if: ${{ needs.release.outputs.should_publish_npm == 'true' }}
    name: publish-npm
    needs: release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22
        registry-url: https://registry.npmjs.org
        scope: '@openai'
    - name: Update npm
      run: npm install -g npm@latest
    - name: Download npm tarballs from release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: "set -euo pipefail\nversion=\"${{ needs.release.outputs.version }}\"\n\
        tag=\"${{ needs.release.outputs.tag }}\"\nmkdir -p dist/npm\npatterns=(\n\
        \  \"codex-npm-${version}.tgz\"\n  \"codex-npm-linux-*-${version}.tgz\"\n\
        \  \"codex-npm-darwin-*-${version}.tgz\"\n  \"codex-npm-win32-*-${version}.tgz\"\
        \n  \"codex-responses-api-proxy-npm-${version}.tgz\"\n  \"codex-sdk-npm-${version}.tgz\"\
        \n)\nfor pattern in \"${patterns[@]}\"; do\n  gh release download \"$tag\"\
        \ \\\n    --repo \"${GITHUB_REPOSITORY}\" \\\n    --pattern \"$pattern\" \\\
        \n    --dir dist/npm\ndone\n"
    - name: Publish to npm
      env:
        VERSION: ${{ needs.release.outputs.version }}
        NPM_TAG: ${{ needs.release.outputs.npm_tag }}
      run: "set -euo pipefail\nprefix=\"\"\nif [[ -n \"${NPM_TAG}\" ]]; then\n  prefix=\"\
        ${NPM_TAG}-\"\nfi\n\nshopt -s nullglob\ntarballs=(dist/npm/*-\"${VERSION}\"\
        .tgz)\nif [[ ${#tarballs[@]} -eq 0 ]]; then\n  echo \"No npm tarballs found\
        \ in dist/npm for version ${VERSION}\"\n  exit 1\nfi\n\nfor tarball in \"\
        ${tarballs[@]}\"; do\n  filename=\"$(basename \"${tarball}\")\"\n  tag=\"\"\
        \n\n  case \"${filename}\" in\n    codex-npm-linux-*-\"${VERSION}\".tgz|codex-npm-darwin-*-\"\
        ${VERSION}\".tgz|codex-npm-win32-*-\"${VERSION}\".tgz)\n      platform=\"\
        ${filename#codex-npm-}\"\n      platform=\"${platform%-${VERSION}.tgz}\"\n\
        \      tag=\"${prefix}${platform}\"\n      ;;\n    codex-npm-\"${VERSION}\"\
        .tgz|codex-responses-api-proxy-npm-\"${VERSION}\".tgz|codex-sdk-npm-\"${VERSION}\"\
        .tgz)\n      tag=\"${NPM_TAG}\"\n      ;;\n    *)\n      echo \"Unexpected\
        \ npm tarball: ${filename}\"\n      exit 1\n      ;;\n  esac\n\n  publish_cmd=(npm\
        \ publish \"${GITHUB_WORKSPACE}/${tarball}\")\n  if [[ -n \"${tag}\" ]]; then\n\
        \    publish_cmd+=(--tag \"${tag}\")\n  fi\n\n  echo \"+ ${publish_cmd[*]}\"\
        \n  set +e\n  publish_output=\"$(\"${publish_cmd[@]}\" 2>&1)\"\n  publish_status=$?\n\
        \  set -e\n\n  echo \"${publish_output}\"\n  if [[ ${publish_status} -eq 0\
        \ ]]; then\n    continue\n  fi\n\n  if grep -qiE \"previously published|cannot\
        \ publish over|version already exists\" <<< \"${publish_output}\"; then\n\
        \    echo \"Skipping already-published package version for ${filename}\"\n\
        \    continue\n  fi\n\n  exit \"${publish_status}\"\ndone\n"
  update-branch:
    name: Update latest-alpha-cli branch
    permissions:
      contents: write
    needs: release
    runs-on: ubuntu-latest
    steps:
    - name: Update latest-alpha-cli branch
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: "set -euo pipefail\ngh api \\\n  repos/${GITHUB_REPOSITORY}/git/refs/heads/latest-alpha-cli\
